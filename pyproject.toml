[project]
name = "c3s"
version = "1.0.0"
requires-python = ">=3.14"
dependencies = [
    "Django[argon2]~=6.0.4",
    "psycopg~=3.3.3",
    "django-allauth[mfa]~=65.15.0",
    "fido2~=2.1.1",
    "pillow~=12.2.0",
    "uvicorn~=0.44.0",
    "django-cleanup~=9.0.0",
    "djangorestframework~=3.17.1",
    "django-environ~=0.13.0",
    "whitenoise~=6.12.0",
    "djangorestframework-stubs~=3.16.9",
    "drf-nested-routers~=0.95.0",
    "django-filter~=25.2",
]
authors = [
  {name = "twonum", email = "two@twonum.org"},
]
maintainers = [
  {name = "twonum", email = "two@twonum.org"}
]
readme = "README.md"
license = "AGPL-3.0-or-later"
license-files = [
    "COPYING",
]

[dependency-groups]
dev = [
    "ruff>=0.15.6",
]

[tool.ruff]
line-length = 79
exclude = [
    ".venv",       # Common sense
    "migrations",  # Auto-generated by Django; don't mess with them
    "manage.py",   # Ditto; don't change Django-generated files
]

[tool.ruff.format]
quote-style = "double"
